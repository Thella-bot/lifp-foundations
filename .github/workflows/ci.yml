name: LIFP CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  SECRET_KEY:    ${{ secrets.SECRET_KEY || 'ci-test-secret-key-32chars-pad!!' }}
  DATABASE_URL:  sqlite:///:memory:
  REDIS_URL:     redis://localhost:6379
  PYTHONPATH:    .

jobs:

  # ── Python service tests ─────────────────────────────────────────────────────
  test-acse:
    name: ACSE — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10", cache: pip }
      - run: pip install -r acse_service/requirements.txt
      - run: pytest acse_service/tests/ -v --tb=short

  test-identity:
    name: Identity — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10", cache: pip }
      - run: pip install -r identity_service/requirements.txt
      - run: pytest identity_service/tests/ -v --tb=short

  test-lender:
    name: Lender — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10", cache: pip }
      - run: pip install -r lender_service/requirements.txt
      - run: pytest lender_service/tests/ -v --tb=short

  test-ussd:
    name: USSD — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10", cache: pip }
      - run: pip install -r ussd_service/requirements.txt
      - run: pytest ussd_service/tests/ -v --tb=short

  # ── Docker build + smoke test ─────────────────────────────────────────────────
  docker-build:
    name: Docker — Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [test-acse, test-identity, test-lender, test-ussd]
    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env << EOF
          POSTGRES_USER=lifp
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD || 'ci-password' }}
          POSTGRES_DB=lifpdb
          SECRET_KEY=${{ env.SECRET_KEY }}
          CORS_ORIGINS=http://localhost:5173
          MODEL_VERSION=dummy-0.1.0
          SCORE_CACHE_TTL=3600
          TOKEN_EXPIRE_MINUTES=60
          AT_API_KEY=sandbox
          AT_USERNAME=sandbox
          EOF

      - name: Build all services in parallel
        run: docker compose build --parallel

      - name: Start infrastructure + run migrations + seed
        run: |
          docker compose up -d db redis
          sleep 8
          docker compose up --exit-code-from migrate migrate
          docker compose up --exit-code-from data_setup data_setup

      - name: Start API services
        run: |
          docker compose up -d acse_service identity_service lender_service ussd_service
          sleep 10

      - name: Health checks
        run: |
          curl -f http://localhost:8001/health || exit 1
          curl -f http://localhost:8002/health || exit 1
          curl -f http://localhost:8003/health || exit 1
          curl -f http://localhost:8004/health || exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Security scan ─────────────────────────────────────────────────────────────
  security:
    name: Security — Bandit + pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - run: pip install bandit pip-audit

      - name: Bandit static analysis
        run: |
          bandit -r acse_service/ identity_service/ lender_service/ \
            ussd_service/ shared/ --skip B101 -f json -o bandit-report.json || true
          python -c "
          import json, sys
          r = json.load(open('bandit-report.json'))
          highs = [i for i in r['results'] if i['issue_severity'] == 'HIGH']
          if highs:
              print('HIGH severity issues found:')
              for i in highs: print(f\"  {i['filename']}:{i['line_number']} — {i['issue_text']}\")
              sys.exit(1)
          print(f'Bandit OK — {len(r[\"results\"])} findings, none HIGH severity.')
          "

      - name: pip-audit
        run: |
          for f in acse_service identity_service lender_service ussd_service; do
            echo "--- $f ---"
            pip-audit -r $f/requirements.txt || true
          done

  # ── PWA build check ───────────────────────────────────────────────────────────
  pwa-build:
    name: PWA — TypeScript + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: pwa/package.json }
      - run: cd pwa && npm install
      - run: cd pwa && npm run build
